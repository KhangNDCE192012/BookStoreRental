spring.application.name=BookStoreRental
server.port=8080

# SQL Server. Change localhost, username and password to your own SQL Server configuration.
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=BookStoreRentalDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB

app.upload-dir=uploads/books
app.base-url=http://localhost:8080
app.mail.enabled=false
app.rental.late-fee-per-day=10000
app.rental.max-days=30
app.rental.max-extension-days=14

# Optional email configuration. Keep app.mail.enabled=false until credentials are configured.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.springframework.security=INFO
