<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title} + ' | Book Store Rental'">
        Book Store Rental
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/app.css}">
</head>

<body>

<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark bg-brand">

    <div class="container">

        <!-- Logo Guest -->
        <a sec:authorize="isAnonymous()"
           class="navbar-brand fw-bold"
           th:href="@{/home}">
            Book Store Rental
        </a>

        <!-- Logo Customer -->
        <a sec:authorize="hasRole('CUSTOMER')"
           class="navbar-brand fw-bold"
           th:href="@{/home}">
            Book Store Rental
        </a>

        <!-- Logo Staff -->
        <a sec:authorize="hasRole('STAFF')"
           class="navbar-brand fw-bold"
           th:href="@{/staff}">
            Staff Management
        </a>

        <!-- Logo Admin -->
        <a sec:authorize="hasRole('ADMIN')"
           class="navbar-brand fw-bold"
           th:href="@{/admin}">
            Admin Management
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNav"
                aria-controls="mainNav"
                aria-expanded="false"
                aria-label="Mở thanh điều hướng">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div id="mainNav"
             class="collapse navbar-collapse">

            <!-- MENU BÊN TRÁI -->
            <ul class="navbar-nav me-auto">

                <!-- ================= GUEST ================= -->

                <li sec:authorize="isAnonymous()"
                    class="nav-item">

                    <a class="nav-link"
                       th:href="@{/home}">
                        Trang chủ
                    </a>
                </li>

                <li sec:authorize="isAnonymous()"
                    class="nav-item">

                    <a class="nav-link"
                       th:href="@{/books}">
                        Sách
                    </a>
                </li>

                <!-- ================= CUSTOMER ================= -->

                <li sec:authorize="hasRole('CUSTOMER')"
                    class="nav-item">

                    <a class="nav-link"
                       th:href="@{/home}">
                        Trang chủ
                    </a>
                </li>

                <li sec:authorize="hasRole('CUSTOMER')"
                    class="nav-item">

                    <a class="nav-link"
                       th:href="@{/books}">
                        Sách
                    </a>
                </li>

                <li sec:authorize="hasRole('CUSTOMER')"
                    class="nav-item">

                    <a class="nav-link"
                       th:href="@{/customer/cart}">
                        Giỏ hàng
                    </a>
                </li>

                <li sec:authorize="hasRole('CUSTOMER')"
                    class="nav-item">

                    <a class="nav-link"
                       th:href="@{/customer/purchases}">
                        Đơn mua
                    </a>
                </li>

                <li sec:authorize="hasRole('CUSTOMER')"
                    class="nav-item">

                    <a class="nav-link"
                       th:href="@{/customer/rentals}">
                        Đơn thuê
                    </a>
                </li>

            </ul>

            <!-- KHU VỰC BÊN PHẢI -->
            <div class="d-flex align-items-center gap-3 ms-auto">

                <!-- ================= GUEST ================= -->

                <div sec:authorize="isAnonymous()"
                     class="d-flex align-items-center gap-2">

                    <a class="btn btn-outline-light btn-sm"
                       th:href="@{/auth/login}">
                        Đăng nhập
                    </a>

                    <a class="btn btn-light btn-sm"
                       th:href="@{/auth/register}">
                        Đăng ký
                    </a>

                </div>

                <!-- ================= CUSTOMER ================= -->

                <div sec:authorize="hasRole('CUSTOMER')"
                     class="d-flex align-items-center gap-2">

                    <span class="text-white small"
                          th:if="${currentUser != null}"
                          th:text="${currentUser.fullName}">
                        Khách hàng
                    </span>

                    <a class="btn btn-outline-light btn-sm"
                       th:href="@{/customer/profile}">
                        Hồ sơ
                    </a>

                    <form th:action="@{/auth/logout}"
                          method="post"
                          class="m-0">

                        <button type="submit"
                                class="btn btn-light btn-sm">
                            Đăng xuất
                        </button>

                    </form>

                </div>

                <!-- ================= STAFF ================= -->

                <div sec:authorize="hasRole('STAFF')"
                     class="d-flex align-items-center gap-3">

                    <span class="text-white fw-semibold">
                        Nhân viên cửa hàng
                    </span>

                    <form th:action="@{/auth/logout}"
                          method="post"
                          class="m-0">

                        <button type="submit"
                                class="btn btn-light btn-sm">
                            Đăng xuất
                        </button>

                    </form>

                </div>

                <!-- ================= ADMIN ================= -->

                <div sec:authorize="hasRole('ADMIN')"
                     class="d-flex align-items-center gap-3">

                    <span class="text-white fw-semibold">
                        Quản trị viên
                    </span>

                    <form th:action="@{/auth/logout}"
                          method="post"
                          class="m-0">

                        <button type="submit"
                                class="btn btn-light btn-sm">
                            Đăng xuất
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</nav>

<div th:fragment="messages"
     class="container mt-3">

    <div th:if="${success}"
         class="alert alert-success"
         th:text="${success}">
    </div>

    <div th:if="${error}"
         class="alert alert-danger"
         th:text="${error}">
    </div>

</div>

<footer th:fragment="footer"
        class="py-4 mt-5 bg-dark text-white-50">

    <div class="container small">
        <p>
            Hotline: 028 3576 129.<br>
            Email: bookstorerental@gmail.com
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <script th:src="@{/js/app.js}"></script>

</footer>

</body>
</html>
