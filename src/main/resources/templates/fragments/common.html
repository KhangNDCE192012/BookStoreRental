<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | Book Store Rental'">Book Store Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-brand">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Book Store Rental</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button>
        <div id="mainNav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/books}">Sách</a></li>
                <li class="nav-item" sec:authorize="hasRole('CUSTOMER')"><a class="nav-link" th:href="@{/customer/cart}">Giỏ hàng</a></li>
                <li class="nav-item" sec:authorize="hasRole('CUSTOMER')"><a class="nav-link" th:href="@{/customer/purchases}">Đơn mua</a></li>
                <li class="nav-item" sec:authorize="hasRole('CUSTOMER')"><a class="nav-link" th:href="@{/customer/rentals}">Đơn thuê</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('STAFF','ADMIN')"><a class="nav-link" th:href="@{/staff}">Staff</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin}">Admin</a></li>
            </ul>
            <div class="d-flex gap-2 align-items-center">
                <span class="text-white small" th:if="${currentUser != null}" th:text="${currentUser.fullName}"></span>
                <a sec:authorize="isAnonymous()" class="btn btn-outline-light btn-sm" th:href="@{/auth/login}">Đăng nhập</a>
                <a sec:authorize="isAnonymous()" class="btn btn-light btn-sm" th:href="@{/auth/register}">Đăng ký</a>
                <a sec:authorize="hasRole('CUSTOMER')" class="btn btn-outline-light btn-sm" th:href="@{/customer/profile}">Hồ sơ</a>
                <form sec:authorize="isAuthenticated()" th:action="@{/auth/logout}" method="post"><button class="btn btn-light btn-sm">Đăng xuất</button></form>
            </div>
        </div>
    </div>
</nav>
<div th:fragment="messages" class="container mt-3">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
</div>
<footer th:fragment="footer" class="py-4 mt-5 bg-dark text-white-50">
    <div class="container small">Book Store &amp; Rental Management System - Spring Boot, Thymeleaf, SQL Server.</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</footer>
</body>
</html>
