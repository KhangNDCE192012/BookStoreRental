<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Quên mật khẩu')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-section"><h1 class="h3">Quên mật khẩu</h1>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <form method="post" th:action="@{/auth/forgot-password}"><label class="form-label">Email đăng ký</label><input
                        type="email" name="email" class="form-control" required>
                    <button class="btn btn-brand mt-3">Tạo liên kết đặt lại</button>
                </form>
                <div th:if="${resetUrl}" class="alert alert-warning mt-3"><strong>Chế độ phát triển:</strong> email đang
                    tắt. Mở <a th:href="${resetUrl}" th:text="${resetUrl}"></a></div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
