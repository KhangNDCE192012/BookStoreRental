<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Đặt lại mật khẩu')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="form-section"><h1 class="h3">Đặt lại mật khẩu</h1>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <form th:if="${resetPasswordForm != null}" th:action="@{/auth/reset-password}"
                      th:object="${resetPasswordForm}" method="post"><input type="hidden" th:field="*{token}"><label
                        class="form-label">Mật khẩu mới</label><input type="password" class="form-control mb-2"
                                                                      th:field="*{newPassword}">
                    <div class="text-danger" th:errors="*{newPassword}"></div>
                    <label class="form-label">Nhập lại</label><input type="password" class="form-control mb-2"
                                                                     th:field="*{confirmPassword}">
                    <div class="text-danger" th:errors="*{confirmPassword}"></div>
                    <button class="btn btn-brand mt-2">Đổi mật khẩu</button>
                </form>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
