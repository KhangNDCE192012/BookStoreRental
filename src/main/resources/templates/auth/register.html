<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/common :: head('Đăng ký')}"></head>

<body>

<nav th:replace="~{fragments/common :: navbar}"></nav>

<div th:replace="~{fragments/common :: messages}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="form-section">
                <h1 class="h3 mb-4">Đăng ký Customer</h1>

                <form th:action="@{/auth/register}"
                      th:object="${registerForm}"
                      method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <div th:if="${#fields.hasGlobalErrors()}"
                         class="alert alert-danger">

                        <div th:each="error : ${#fields.globalErrors()}"
                             th:text="${error}">
                            Đăng ký không thành công
                        </div>
                    </div>

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">
                                Tên đăng nhập
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{username}"
                                   required
                                   autocomplete="username">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('username')}"
                                 th:errors="*{username}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   required
                                   autocomplete="email">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                Họ và tên
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{fullName}"
                                   required
                                   autocomplete="name">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                Số điện thoại
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}"
                                   autocomplete="tel">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('phone')}"
                                 th:errors="*{phone}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                Mật khẩu
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   required
                                   autocomplete="new-password">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                Nhập lại mật khẩu
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{confirmPassword}"
                                   required
                                   autocomplete="new-password">

                            <div class="text-danger small"
                                 th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}">
                            </div>
                        </div>

                    </div>

                    <button type="submit"
                            class="btn btn-brand mt-4 w-100">
                        Đăng ký
                    </button>

                    <div class="text-center mt-3">
                        Đã có tài khoản?
                        <a th:href="@{/auth/login}">
                            Đăng nhập
                        </a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/common :: footer}"></footer>

</body>
</html>
