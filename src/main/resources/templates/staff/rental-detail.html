<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Xử lý đơn thuê')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><main class="container py-4"><h1 th:text="${'Đơn thuê ' + order.rentalCode}"></h1><div class="row g-4"><div class="col-lg-8"><div class="form-section" th:each="d:${order.details}"><div class="d-flex justify-content-between"><h5 th:text="${d.book.title}"></h5><span class="badge text-bg-secondary" th:text="${d.bookCopy.status}"></span></div><p>Mã cuốn: <strong th:text="${d.bookCopy.copyCode}"></strong> | Hạn trả: <span th:text="${d.dueDate==null?'-':#temporals.format(d.dueDate,'dd/MM/yyyy HH:mm')}"></span></p><form th:if="${order.rentalStatus.name()=='RETURN_REQUESTED' or order.rentalStatus.name()=='OVERDUE' or order.rentalStatus.name()=='RENTING'}" th:action="@{/staff/rentals/details/{id}/return(id=${d.id})}" method="post"><input type="hidden" name="orderId" th:value="${order.id}"><div class="row g-2"><div class="col-md-3"><select class="form-select" name="conditionAfter"><option value="GOOD">Tốt</option><option value="FAIR">Cũ vừa</option><option value="DAMAGED">Hư hỏng</option><option value="LOST">Thất lạc</option></select></div><div class="col-md-3"><input type="number" class="form-control" name="damageFee" value="0" min="0" placeholder="Phí hư hỏng"></div><div class="col-md-4"><input class="form-control" name="notes" placeholder="Ghi chú"></div><div class="col-md-2"><button class="btn btn-brand w-100">Ghi nhận trả</button></div></div></form></div></div><div class="col-lg-4"><div class="form-section"><p>Khách: <strong th:text="${order.user.fullName}"></strong></p><p>Trạng thái: <strong th:text="${order.rentalStatus}"></strong></p><p>Tiền thuê: <span th:text="${#numbers.formatDecimal(order.rentalFee,0,'COMMA',0,'POINT')}+' đ'"></span></p><p>Tiền cọc: <span th:text="${#numbers.formatDecimal(order.depositAmount,0,'COMMA',0,'POINT')}+' đ'"></span></p><div th:if="${order.rentalStatus.name()=='PENDING'}"><form th:action="@{/staff/rentals/{id}/approve(id=${order.id})}" method="post"><button class="btn btn-success w-100 mb-2">Xác nhận giao sách</button></form><form th:action="@{/staff/rentals/{id}/reject(id=${order.id})}" method="post"><input class="form-control mb-2" name="reason" placeholder="Lý do"><button class="btn btn-danger w-100">Từ chối & hoàn tiền</button></form></div></div></div></div></main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
