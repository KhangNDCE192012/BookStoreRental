<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Doanh thu')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<main class="container py-4"><h1>Thống kê doanh thu</h1>
    <form class="row g-2 form-section" method="get">
        <div class="col-md-4"><input type="date" class="form-control" name="from" th:value="${from}"></div>
        <div class="col-md-4"><input type="date" class="form-control" name="to" th:value="${to}"></div>
        <div class="col-md-4">
            <button class="btn btn-brand">Xem</button>
            <a class="btn btn-outline-dark" th:href="@{/staff/revenue/export.csv(from=${from},to=${to})}">Xuất CSV</a>
        </div>
    </form>
    <div class="row g-3 my-3">
        <div class="col-md-4">
            <div class="hero p-3"><small>Tổng doanh thu</small>
                <h3 th:text="${#numbers.formatDecimal(summary.totalRevenue,0,'COMMA',0,'POINT')}+' đ'"></h3></div>
        </div>
        <div class="col-md-4">
            <div class="form-section"><small>Đơn mua</small>
                <h3 th:text="${#numbers.formatDecimal(summary.purchaseRevenue,0,'COMMA',0,'POINT')}+' đ'"></h3></div>
        </div>
        <div class="col-md-4">
            <div class="form-section"><small>Đơn thuê</small>
                <h3 th:text="${#numbers.formatDecimal(summary.rentalRevenue,0,'COMMA',0,'POINT')}+' đ'"></h3></div>
        </div>
    </div>
    <table class="table">
        <thead>
        <tr>
            <th>Thời gian</th>
            <th>Loại</th>
            <th>Số tiền</th>
            <th>Trạng thái</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p:${summary.payments}">
            <td th:text="${#temporals.format(p.paidAt,'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${p.purchaseOrder != null ? 'MUA' : 'THUÊ'}"></td>
            <td th:text="${#numbers.formatDecimal(p.amount,0,'COMMA',0,'POINT')}+' đ'"></td>
            <td th:text="${p.paymentStatus}"></td>
        </tr>
        </tbody>
    </table>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
