<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Xử lý đơn mua')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><main class="container py-4"><h1 th:text="${'Đơn mua ' + order.orderCode}"></h1><div class="row g-4"><div class="col-lg-8"><table class="table"><thead><tr><th>Sách</th><th>Mã cuốn</th><th>Trạng thái cuốn</th><th>Giá</th></tr></thead><tbody><tr th:each="d:${order.details}"><td th:text="${d.book.title}"></td><td th:text="${d.bookCopy.copyCode}"></td><td th:text="${d.bookCopy.status}"></td><td th:text="${#numbers.formatDecimal(d.unitPrice,0,'COMMA',0,'POINT')}+' đ'"></td></tr></tbody></table></div><div class="col-lg-4"><div class="form-section"><p>Khách hàng: <strong th:text="${order.user.fullName}"></strong></p><p>Điện thoại: <span th:text="${order.receiverPhone}"></span></p><p>Địa chỉ: <span th:text="${order.shippingAddress}"></span></p><p>Trạng thái: <strong th:text="${order.orderStatus}"></strong></p><h4 th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')}+' đ'"></h4><div th:if="${order.orderStatus.name()=='PENDING'}"><form th:action="@{/staff/purchases/{id}/approve(id=${order.id})}" method="post"><button class="btn btn-success w-100 mb-2">Xác nhận bán</button></form><form th:action="@{/staff/purchases/{id}/reject(id=${order.id})}" method="post"><input class="form-control mb-2" name="reason" placeholder="Lý do từ chối"><button class="btn btn-danger w-100">Từ chối & hoàn tiền</button></form></div><form th:if="${order.orderStatus.name()=='CONFIRMED' or order.orderStatus.name()=='SHIPPING'}" th:action="@{/staff/purchases/{id}/complete(id=${order.id})}" method="post"><button class="btn btn-brand w-100">Hoàn tất đơn</button></form></div></div></div></main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
