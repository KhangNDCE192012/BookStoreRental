<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Staff Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: messages}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between"><h1>Staff - Xử lý đơn</h1><a class="btn btn-outline-dark"
                                                                             th:href="@{/staff/revenue}">Doanh thu</a>
    </div>
    <h3 class="mt-4">Đơn mua</h3>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Mã đơn</th>
                <th>Ngày</th>
                <th>Tổng</th>
                <th>Trạng thái</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o:${purchaseOrders}">
                <td><a th:href="@{/staff/purchases/{id}(id=${o.id})}" th:text="${o.orderCode}"></a></td>
                <td th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')}+' đ'"></td>
                <td th:text="${o.orderStatus}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    <h3 class="mt-4">Đơn thuê</h3>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Mã đơn</th>
                <th>Ngày</th>
                <th>Hạn trả</th>
                <th>Trạng thái</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o:${rentalOrders}">
                <td><a th:href="@{/staff/rentals/{id}(id=${o.id})}" th:text="${o.rentalCode}"></a></td>
                <td th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${o.dueDate==null?'-':#temporals.format(o.dueDate,'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${o.rentalStatus}"></td>
            </tr>
            </tbody>
        </table>
    </div>
    <h3 class="mt-4">Yêu cầu gia hạn chờ xử lý</h3>
    <table class="table">
        <thead>
        <tr>
            <th>Sách</th>
            <th>Thêm ngày</th>
            <th>Phí</th>
            <th>Lý do</th>
            <th>Xử lý</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r:${extensionRequests}">
            <td th:text="${r.rentalOrderDetail.book.title}"></td>
            <td th:text="${r.extraDays}"></td>
            <td th:text="${#numbers.formatDecimal(r.extraFee,0,'COMMA',0,'POINT')}+' đ'"></td>
            <td th:text="${r.reason}"></td>
            <td>
                <form class="d-flex gap-1" th:action="@{/staff/extensions/{id}/process(id=${r.id})}" method="post">
                    <input class="form-control form-control-sm" name="note" placeholder="Ghi chú">
                    <button class="btn btn-sm btn-success" name="approve" value="true">Duyệt</button>
                    <button class="btn btn-sm btn-danger" name="approve" value="false">Từ chối</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
