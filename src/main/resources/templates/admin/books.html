<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Quản lý sách')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><div class="container-fluid"><div class="row"><aside class="col-md-2 p-0"><div th:replace="~{fragments/admin-sidebar :: sidebar}"></div></aside><main class="col-md-10 p-4"><div class="d-flex justify-content-between"><h1>Quản lý đầu sách</h1><a class="btn btn-brand" th:href="@{/admin/books/new}">Thêm sách</a></div><div class="table-responsive"><table class="table table-hover"><thead><tr><th>ISBN</th><th>Tên</th><th>Tác giả</th><th>Thể loại</th><th>Giá mua</th><th>Trạng thái</th><th></th></tr></thead><tbody><tr th:each="b:${books}"><td th:text="${b.isbn}"></td><td th:text="${b.title}"></td><td th:text="${b.author}"></td><td th:text="${b.category.name}"></td><td th:text="${#numbers.formatDecimal(b.purchasePrice,0,'COMMA',0,'POINT')}+' đ'"></td><td th:text="${b.status}"></td><td><a class="btn btn-sm btn-outline-dark" th:href="@{/admin/books/{id}/edit(id=${b.id})}">Sửa</a> <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/books/{id}/copies(id=${b.id})}">Kho vật lý</a></td></tr></tbody></table></div></main></div></div><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
