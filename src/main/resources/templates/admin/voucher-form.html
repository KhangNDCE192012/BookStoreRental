<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Biểu mẫu voucher')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div class="container-fluid"><div class="row"><aside class="col-md-2 p-0"><div th:replace="~{fragments/admin-sidebar :: sidebar}"></div></aside><main class="col-md-10 p-4"><h1 th:text="${voucher==null?'Tạo voucher':'Cập nhật voucher'}"></h1><div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="e:${#fields.globalErrors()}" th:text="${e}"></div><form class="form-section" th:action="@{/admin/vouchers/save}" th:object="${voucherForm}" method="post"><input type="hidden" name="id" th:value="${voucher==null?null:voucher.id}"><div class="row g-3"><div class="col-md-3"><label>Mã</label><input class="form-control" th:field="*{code}"></div><div class="col-md-5"><label>Tên</label><input class="form-control" th:field="*{name}"></div><div class="col-md-2"><label>Loại</label><select class="form-select" th:field="*{type}"><option th:each="t:${types}" th:value="${t}" th:text="${t}"></option></select></div><div class="col-md-2"><label>Giá trị</label><input type="number" class="form-control" th:field="*{discountValue}"></div><div class="col-md-3"><label>Đơn tối thiểu</label><input type="number" class="form-control" th:field="*{minimumOrderAmount}"></div><div class="col-md-3"><label>Giảm tối đa</label><input type="number" class="form-control" th:field="*{maximumDiscount}"></div><div class="col-md-3"><label>Bắt đầu</label><input type="datetime-local" class="form-control" th:field="*{startDate}"></div><div class="col-md-3"><label>Kết thúc</label><input type="datetime-local" class="form-control" th:field="*{endDate}"></div><div class="col-md-3"><label>Số lượng</label><input type="number" class="form-control" th:field="*{quantity}"></div><div class="col-md-3"><label>Giới hạn/người</label><input type="number" class="form-control" th:field="*{perUserLimit}"></div><div class="col-md-3 form-check mt-5"><input class="form-check-input" type="checkbox" th:field="*{active}"><label class="form-check-label">Đang hoạt động</label></div></div><button class="btn btn-brand mt-3">Lưu voucher</button></form></main></div></div><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
