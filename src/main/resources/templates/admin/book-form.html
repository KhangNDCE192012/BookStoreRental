<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Biểu mẫu sách')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div class="container-fluid">
    <div class="row">
        <aside class="col-md-2 p-0">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </aside>
        <main class="col-md-10 p-4"><h1 th:text="${book==null?'Thêm đầu sách':'Cập nhật đầu sách'}"></h1>
            <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}" th:each="e:${#fields.globalErrors()}"
                 th:text="${e}"></div>
            <form class="form-section" th:action="@{/admin/books/save}" th:object="${bookForm}" method="post"
                  enctype="multipart/form-data"><input type="hidden" name="id" th:value="${book==null?null:book.id}">
                <div class="row g-3">
                    <div class="col-md-4"><label>ISBN</label><input class="form-control" th:field="*{isbn}">
                        <div class="text-danger" th:errors="*{isbn}"></div>
                    </div>
                    <div class="col-md-8"><label>Tên sách</label><input class="form-control" th:field="*{title}"></div>
                    <div class="col-md-6"><label>Tác giả</label><input class="form-control" th:field="*{author}"></div>
                    <div class="col-md-6"><label>Nhà xuất bản</label><input class="form-control"
                                                                            th:field="*{publisher}"></div>
                    <div class="col-md-3"><label>Năm xuất bản</label><input type="number" class="form-control"
                                                                            th:field="*{publicationYear}"></div>
                    <div class="col-md-3"><label>Ngôn ngữ</label><input class="form-control" th:field="*{language}">
                    </div>
                    <div class="col-md-3"><label>Số trang</label><input type="number" class="form-control"
                                                                        th:field="*{pageCount}"></div>
                    <div class="col-md-3"><label>Thể loại</label><select class="form-select" th:field="*{categoryId}">
                        <option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                    </select></div>
                    <div class="col-md-4"><label>Giá bán</label><input type="number" class="form-control"
                                                                       th:field="*{purchasePrice}"></div>
                    <div class="col-md-4"><label>Phí thuê/ngày</label><input type="number" class="form-control"
                                                                             th:field="*{rentalPricePerDay}"></div>
                    <div class="col-md-4"><label>Tiền cọc</label><input type="number" class="form-control"
                                                                        th:field="*{rentalDeposit}"></div>
                    <div class="col-md-4"><label>Trạng thái</label><select class="form-select" th:field="*{status}">
                        <option th:each="s:${statuses}" th:value="${s}" th:text="${s}"></option>
                    </select></div>
                    <div class="col-md-8"><label>Ảnh bìa</label><input type="file" class="form-control" name="cover"
                                                                       accept="image/*"></div>
                    <div class="col-12"><label>Mô tả</label><textarea class="form-control" rows="5"
                                                                      th:field="*{description}"></textarea></div>
                </div>
                <button class="btn btn-brand mt-3">Lưu sách</button>
            </form>
        </main>
    </div>
</div>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
