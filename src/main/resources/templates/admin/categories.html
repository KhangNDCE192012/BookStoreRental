<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Thể loại')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: messages}"></div>
<div class="container-fluid">
    <div class="row">
        <aside class="col-md-2 p-0">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </aside>
        <main class="col-md-10 p-4"><h1>Thể loại sách</h1>
            <form class="form-section row g-2" th:action="@{/admin/categories/save}" method="post">
                <div class="col-md-3"><input class="form-control" name="name" placeholder="Tên thể loại" required></div>
                <div class="col-md-5"><input class="form-control" name="description" placeholder="Mô tả"></div>
                <div class="col-md-2"><select class="form-select" name="status">
                    <option th:each="s:${statuses}" th:value="${s}" th:text="${s}"></option>
                </select></div>
                <div class="col-md-2">
                    <button class="btn btn-brand w-100">Thêm</button>
                </div>
            </form>
            <table class="table mt-3">
                <thead>
                <tr>
                    <th>Tên</th>
                    <th>Mô tả</th>
                    <th>Trạng thái</th>
                    <th>Cập nhật nhanh</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c:${categories}">
                    <td th:text="${c.name}"></td>
                    <td th:text="${c.description}"></td>
                    <td th:text="${c.status}"></td>
                    <td>
                        <form class="d-flex gap-1" th:action="@{/admin/categories/save}" method="post"><input
                                type="hidden" name="id" th:value="${c.id}"><input class="form-control form-control-sm"
                                                                                  name="name"
                                                                                  th:value="${c.name}"><input
                                class="form-control form-control-sm" name="description"
                                th:value="${c.description}"><select class="form-select form-select-sm" name="status">
                            <option th:each="s:${statuses}" th:value="${s}" th:selected="${s==c.status}"
                                    th:text="${s}"></option>
                        </select>
                            <button class="btn btn-sm btn-outline-dark">Lưu</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </main>
    </div>
</div>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
