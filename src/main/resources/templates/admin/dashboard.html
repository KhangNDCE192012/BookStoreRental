<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Admin Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div class="container-fluid">
    <div class="row">
        <aside class="col-md-2 p-0">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </aside>
        <main class="col-md-10 p-4"><h1>Admin Dashboard</h1>
            <div class="row g-3">
                <div class="col-md-4 col-xl-2">
                    <div class="form-section"><small>Đầu sách</small>
                        <h2 th:text="${bookCount}"></h2></div>
                </div>
                <div class="col-md-4 col-xl-2">
                    <div class="form-section"><small>Khách hàng</small>
                        <h2 th:text="${customerCount}"></h2></div>
                </div>
                <div class="col-md-4 col-xl-2">
                    <div class="form-section"><small>Nhân viên</small>
                        <h2 th:text="${staffCount}"></h2></div>
                </div>
                <div class="col-md-4 col-xl-2">
                    <div class="form-section"><small>Đơn mua</small>
                        <h2 th:text="${purchaseCount}"></h2></div>
                </div>
                <div class="col-md-4 col-xl-2">
                    <div class="form-section"><small>Đơn thuê</small>
                        <h2 th:text="${rentalCount}"></h2></div>
                </div>
            </div>
            <h3 class="mt-4">Hoạt động gần đây</h3>
            <table class="table">
                <thead>
                <tr>
                    <th>Thời gian</th>
                    <th>Hành động</th>
                    <th>Đối tượng</th>
                    <th>Chi tiết</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="l:${logs}">
                    <td th:text="${#temporals.format(l.createdAt,'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${l.action}"></td>
                    <td th:text="${l.entityType+' '+l.entityId}"></td>
                    <td th:text="${l.details}"></td>
                </tr>
                </tbody>
            </table>
        </main>
    </div>
</div>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
