<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Voucher')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><div class="container-fluid"><div class="row"><aside class="col-md-2 p-0"><div th:replace="~{fragments/admin-sidebar :: sidebar}"></div></aside><main class="col-md-10 p-4"><div class="d-flex justify-content-between"><h1>Voucher</h1><a class="btn btn-brand" th:href="@{/admin/vouchers/new}">Tạo voucher</a></div><table class="table"><thead><tr><th>Mã</th><th>Tên</th><th>Loại</th><th>Giá trị</th><th>Số lượng</th><th>Hiệu lực</th><th></th></tr></thead><tbody><tr th:each="v:${vouchers}"><td th:text="${v.code}"></td><td th:text="${v.name}"></td><td th:text="${v.type}"></td><td th:text="${v.discountValue}"></td><td th:text="${v.quantity}"></td><td th:text="${#temporals.format(v.startDate,'dd/MM/yyyy')+' - '+#temporals.format(v.endDate,'dd/MM/yyyy')}"></td><td><a class="btn btn-sm btn-outline-dark" th:href="@{/admin/vouchers/{id}/edit(id=${v.id})}">Sửa</a></td></tr></tbody></table></main></div></div><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
