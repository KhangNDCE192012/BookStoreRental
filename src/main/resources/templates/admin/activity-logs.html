<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Lịch sử chỉnh sửa')}"></head>
<body>
<nav th:replace="~{fragments/common :: navbar}"></nav>
<div class="container-fluid">
    <div class="row">
        <aside class="col-md-2 p-0">
            <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
        </aside>
        <main class="col-md-10 p-4"><h1>Lịch sử chỉnh sửa</h1>
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Thời gian</th>
                    <th>Hành động</th>
                    <th>Loại</th>
                    <th>ID</th>
                    <th>Chi tiết</th>
                    <th>IP</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="l:${logs}">
                    <td th:text="${#temporals.format(l.createdAt,'dd/MM/yyyy HH:mm:ss')}"></td>
                    <td th:text="${l.action}"></td>
                    <td th:text="${l.entityType}"></td>
                    <td th:text="${l.entityId}"></td>
                    <td th:text="${l.details}"></td>
                    <td th:text="${l.ipAddress}"></td>
                </tr>
                </tbody>
            </table>
        </main>
    </div>
</div>
<footer th:replace="~{fragments/common :: footer}"></footer>
</body>
</html>
