<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head th:replace="~{fragments/common :: head(${book.title})}"></head><body>
<nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div>
<main class="container py-5"><div class="row g-5"><div class="col-md-4"><img class="img-fluid rounded shadow book-cover w-100" th:src="${book.coverImage != null ? book.coverImage : '/img/book-placeholder.svg'}"></div><div class="col-md-8">
<span class="badge badge-soft" th:text="${book.category.name}"></span><h1 class="mt-2" th:text="${book.title}"></h1><p class="lead" th:text="${book.author}"></p><p th:text="${book.description}"></p>
<dl class="row"><dt class="col-sm-3">ISBN</dt><dd class="col-sm-9" th:text="${book.isbn}"></dd><dt class="col-sm-3">Nhà xuất bản</dt><dd class="col-sm-9" th:text="${book.publisher}"></dd><dt class="col-sm-3">Còn sẵn</dt><dd class="col-sm-9" th:text="${availableCopies}+' cuốn'"></dd></dl>
<div class="row"><div class="col-md-6"><div class="border rounded p-3"><h5>Mua sách</h5><p class="price" th:text="${#numbers.formatDecimal(book.purchasePrice,0,'COMMA',0,'POINT')}+' đ'"></p><form sec:authorize="hasRole('CUSTOMER')" th:action="@{/customer/cart/add/{id}(id=${book.id})}" method="post"><input type="hidden" name="type" value="PURCHASE"><input class="form-control mb-2" type="number" name="quantity" min="1" value="1"><button class="btn btn-brand w-100" th:disabled="${availableCopies==0}">Thêm vào giỏ mua</button></form></div></div>
<div class="col-md-6"><div class="border rounded p-3"><h5>Thuê sách</h5><p><span class="price" th:text="${#numbers.formatDecimal(book.rentalPricePerDay,0,'COMMA',0,'POINT')}+' đ/ngày'"></span><br>Đặt cọc: <span th:text="${#numbers.formatDecimal(book.rentalDeposit,0,'COMMA',0,'POINT')}+' đ'"></span></p><form sec:authorize="hasRole('CUSTOMER')" th:action="@{/customer/cart/add/{id}(id=${book.id})}" method="post"><input type="hidden" name="type" value="RENTAL"><div class="row g-2"><div class="col"><input class="form-control" type="number" name="quantity" min="1" value="1"></div><div class="col"><input class="form-control" type="number" name="rentalDays" min="1" max="30" value="7"></div></div><button class="btn btn-outline-dark w-100 mt-2" th:disabled="${availableCopies==0}">Thêm vào giỏ thuê</button></form></div></div></div>
<div sec:authorize="isAnonymous()" class="alert alert-info mt-3">Vui lòng <a th:href="@{/auth/login}">đăng nhập</a> để mua hoặc thuê sách.</div>
</div></div></main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
