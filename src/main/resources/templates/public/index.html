<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head('Trang chủ')}"></head>

<body>

<nav th:replace="~{fragments/common :: navbar}"></nav>
<div th:replace="~{fragments/common :: messages}"></div>

<main class="container py-4">

    <section class="hero p-5 mb-5">
        <div class="row align-items-center">
            <div class="col-lg-8">
                <h1>Đọc, sở hữu hoặc thuê cuốn sách bạn yêu thích</h1>
                <p class="lead">
                    Quản lý sách vật lý, đơn mua, đơn thuê, ví và voucher trên cùng một hệ thống.
                </p>
                <a class="btn btn-light" th:href="@{/books}">
                    Khám phá sách
                </a>
            </div>
        </div>
    </section>

    <h2 class="mb-3">Sách mới</h2>

    <div class="row g-4">

        <div class="col-6 col-md-4 col-lg-3" th:each="book : ${books}">

            <div class="card card-book">

                <img class="card-img-top book-cover"
                     th:src="${book.title == 'Nhà Giả Kim' ? '/img/nha_gia_kim.jpg' :
         book.title == 'Khởi Nghiệp Tinh Gọn' ? '/img/Khoi-nghiep-tinh-gon.jpg' :
         book.title == 'Dế Mèn Phiêu Lưu Ký' ? '/img/demen.jpg' :
         book.title == 'Clean Code' ? '/img/Clean_code.jpg' :
         book.coverImage}">

                <div class="card-body">

                    <span class="badge badge-soft"
                          th:text="${book.category.name}">
                    </span>

                    <h5 class="mt-2"
                        th:text="${book.title}">
                    </h5>

                    <p class="text-muted"
                       th:text="${book.author}">
                    </p>

                    <div class="price"
                         th:text="${#numbers.formatDecimal(book.purchasePrice,0,'COMMA',0,'POINT')} + ' đ'">
                    </div>

                    <a class="stretched-link"
                       th:href="@{/books/{id}(id=${book.id})}">
                    </a>

                </div>

            </div>

        </div>

    </div>

</main>

<footer th:replace="~{fragments/common :: footer}"></footer>

</body>
</html>
