<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Giỏ hàng')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><main class="container py-4"><div class="d-flex justify-content-between"><h1>Giỏ hàng</h1><a class="btn btn-outline-dark" th:href="@{/customer/wallet}">Ví tiền</a></div>
<div class="alert alert-warning" th:if="${#lists.isEmpty(addresses)}">Bạn cần <a th:href="@{/customer/profile}">thêm địa chỉ</a> trước khi thanh toán.</div>
<h3 class="mt-4">Sách mua</h3><div class="table-responsive"><table class="table"><thead><tr><th>Sách</th><th>Đơn giá</th><th>Số lượng</th><th>Thành tiền</th><th></th></tr></thead><tbody><tr th:each="item:${cart.items}" th:if="${item.itemType.name() == 'PURCHASE'}"><td th:text="${item.book.title}"></td><td th:text="${#numbers.formatDecimal(item.book.purchasePrice,0,'COMMA',0,'POINT')}+' đ'"></td><td><form class="d-flex gap-2" th:action="@{/customer/cart/items/{id}/update(id=${item.id})}" method="post"><input class="form-control form-control-sm" style="width:80px" type="number" name="quantity" min="0" th:value="${item.quantity}"><button class="btn btn-sm btn-outline-dark">Lưu</button></form></td><td th:text="${#numbers.formatDecimal(item.book.purchasePrice*item.quantity,0,'COMMA',0,'POINT')}+' đ'"></td><td><form th:action="@{/customer/cart/items/{id}/remove(id=${item.id})}" method="post"><button class="btn btn-sm btn-outline-danger">Xóa</button></form></td></tr></tbody></table></div><p class="fw-bold">Tạm tính: <span th:text="${#numbers.formatDecimal(purchaseSubtotal,0,'COMMA',0,'POINT')}+' đ'"></span> + 30.000 đ phí giao</p>
<form class="form-section" th:action="@{/customer/purchases/checkout}" method="post"><div class="row g-2"><div class="col-md-6"><select class="form-select" name="addressId" required><option value="">Chọn địa chỉ giao nhận</option><option th:each="a:${addresses}" th:value="${a.id}" th:text="${a.fullAddress}"></option></select></div><div class="col-md-3"><input class="form-control" name="voucherCode" placeholder="Mã voucher"></div><div class="col-md-3"><button class="btn btn-brand w-100" th:disabled="${purchaseSubtotal.signum()==0 or #lists.isEmpty(addresses)}">Thanh toán đơn mua bằng ví</button></div></div></form>
<h3 class="mt-5">Sách thuê</h3><div class="table-responsive"><table class="table"><thead><tr><th>Sách</th><th>Phí/ngày</th><th>Số lượng</th><th>Số ngày</th><th>Cọc/cuốn</th><th></th></tr></thead><tbody><tr th:each="item:${cart.items}" th:if="${item.itemType.name() == 'RENTAL'}"><td th:text="${item.book.title}"></td><td th:text="${#numbers.formatDecimal(item.book.rentalPricePerDay,0,'COMMA',0,'POINT')}+' đ'"></td><td colspan="2"><form class="d-flex gap-2" th:action="@{/customer/cart/items/{id}/update(id=${item.id})}" method="post"><input class="form-control form-control-sm" style="width:70px" type="number" name="quantity" min="0" th:value="${item.quantity}"><input class="form-control form-control-sm" style="width:85px" type="number" name="rentalDays" min="1" max="30" th:value="${item.rentalDays}"><button class="btn btn-sm btn-outline-dark">Lưu</button></form></td><td th:text="${#numbers.formatDecimal(item.book.rentalDeposit,0,'COMMA',0,'POINT')}+' đ'"></td><td><form th:action="@{/customer/cart/items/{id}/remove(id=${item.id})}" method="post"><button class="btn btn-sm btn-outline-danger">Xóa</button></form></td></tr></tbody></table></div><p class="fw-bold">Phí thuê tạm tính: <span th:text="${#numbers.formatDecimal(rentalSubtotal,0,'COMMA',0,'POINT')}+' đ'"></span> (chưa gồm tiền cọc)</p>
<form class="form-section" th:action="@{/customer/rentals/checkout}" method="post"><div class="row g-2"><div class="col-md-6"><select class="form-select" name="addressId" required><option value="">Chọn địa chỉ giao nhận</option><option th:each="a:${addresses}" th:value="${a.id}" th:text="${a.fullAddress}"></option></select></div><div class="col-md-3"><input class="form-control" name="voucherCode" placeholder="Mã voucher"></div><div class="col-md-3"><button class="btn btn-outline-dark w-100" th:disabled="${rentalSubtotal.signum()==0 or #lists.isEmpty(addresses)}">Thanh toán đơn thuê bằng ví</button></div></div></form>
</main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
