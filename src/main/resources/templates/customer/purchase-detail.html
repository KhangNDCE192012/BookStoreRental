<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Chi tiết đơn mua')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><main class="container py-4"><h1 th:text="${'Đơn mua ' + order.orderCode}"></h1><div class="row g-4"><div class="col-lg-8"><div class="form-section"><table class="table"><thead><tr><th>Sách</th><th>Mã cuốn</th><th>Giá</th></tr></thead><tbody><tr th:each="d:${order.details}"><td th:text="${d.book.title}"></td><td th:text="${d.bookCopy.copyCode}"></td><td th:text="${#numbers.formatDecimal(d.unitPrice,0,'COMMA',0,'POINT')}+' đ'"></td></tr></tbody></table></div></div><div class="col-lg-4"><div class="form-section"><p>Trạng thái: <strong th:text="${order.orderStatus}"></strong></p><p>Thanh toán: <strong th:text="${order.paymentStatus}"></strong></p><p>Giao đến: <span th:text="${order.shippingAddress}"></span></p><hr><p>Tạm tính: <span th:text="${#numbers.formatDecimal(order.subtotal,0,'COMMA',0,'POINT')}+' đ'"></span></p><p>Giảm: <span th:text="${#numbers.formatDecimal(order.discountAmount,0,'COMMA',0,'POINT')}+' đ'"></span></p><p>Phí giao: <span th:text="${#numbers.formatDecimal(order.shippingFee,0,'COMMA',0,'POINT')}+' đ'"></span></p><h4 th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')}+' đ'"></h4><form th:if="${order.orderStatus.name()=='PENDING'}" th:action="@{/customer/purchases/{id}/cancel(id=${order.id})}" method="post"><input class="form-control mb-2" name="reason" placeholder="Lý do hủy"><button class="btn btn-danger w-100" data-confirm="Hủy đơn và hoàn tiền?">Hủy đơn</button></form></div></div></div></main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
