<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Ví tiền')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><main class="container py-4"><div class="row g-4"><div class="col-md-4"><div class="hero p-4"><h5>Số dư ví</h5><div class="display-6" th:text="${#numbers.formatDecimal(wallet.balance,0,'COMMA',0,'POINT')}+' đ'"></div></div><div class="form-section mt-3"><h5>Nạp tiền mô phỏng</h5><form th:action="@{/customer/wallet/top-up}" method="post"><input type="number" class="form-control" name="amount" min="10000" step="10000" value="100000"><button class="btn btn-brand mt-2 w-100">Nạp tiền</button></form><small class="text-muted">Đây là luồng demo, chưa kết nối cổng thanh toán thật.</small></div></div><div class="col-md-8"><h3>Lịch sử giao dịch</h3><div class="table-responsive"><table class="table table-striped"><thead><tr><th>Thời gian</th><th>Loại</th><th>Mô tả</th><th>Số tiền</th><th>Số dư sau</th></tr></thead><tbody><tr th:each="t:${transactions}"><td th:text="${#temporals.format(t.createdAt,'dd/MM/yyyy HH:mm')}"></td><td th:text="${t.type}"></td><td th:text="${t.description}"></td><td th:classappend="${t.amount.signum()>=0}?'text-success':'text-danger'" th:text="${#numbers.formatDecimal(t.amount,0,'COMMA',0,'POINT')}+' đ'"></td><td th:text="${#numbers.formatDecimal(t.balanceAfter,0,'COMMA',0,'POINT')}+' đ'"></td></tr></tbody></table></div></div></div></main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
