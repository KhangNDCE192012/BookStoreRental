<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/common :: head('Chi tiết đơn thuê')}"></head><body><nav th:replace="~{fragments/common :: navbar}"></nav><div th:replace="~{fragments/common :: messages}"></div><main class="container py-4"><h1 th:text="${'Đơn thuê ' + order.rentalCode}"></h1><div class="row g-4"><div class="col-lg-8"><div class="form-section"><table class="table"><thead><tr><th>Sách</th><th>Mã cuốn</th><th>Ngày thuê</th><th>Hạn trả</th><th>Gia hạn</th></tr></thead><tbody><tr th:each="d:${order.details}"><td th:text="${d.book.title}"></td><td th:text="${d.bookCopy.copyCode}"></td><td th:text="${d.rentalDate==null?'-':#temporals.format(d.rentalDate,'dd/MM/yyyy')}"></td><td th:text="${d.dueDate==null?'-':#temporals.format(d.dueDate,'dd/MM/yyyy')}"></td><td><form th:if="${order.rentalStatus.name()=='RENTING'}" th:action="@{/customer/rentals/details/{id}/extension(id=${d.id})}" method="post" class="d-flex gap-1"><input type="hidden" name="orderId" th:value="${order.id}"><input class="form-control form-control-sm" style="width:75px" type="number" name="extraDays" min="1" max="14" value="3"><input class="form-control form-control-sm" name="reason" placeholder="Lý do"><button class="btn btn-sm btn-outline-dark">Gửi</button></form></td></tr></tbody></table></div></div><div class="col-lg-4"><div class="form-section"><p>Trạng thái: <strong th:text="${order.rentalStatus}"></strong></p><p>Hạn trả cuối: <span th:text="${order.dueDate==null?'-':#temporals.format(order.dueDate,'dd/MM/yyyy HH:mm')}"></span></p><p>Phí thuê: <span th:text="${#numbers.formatDecimal(order.rentalFee,0,'COMMA',0,'POINT')}+' đ'"></span></p><p>Tiền cọc: <span th:text="${#numbers.formatDecimal(order.depositAmount,0,'COMMA',0,'POINT')}+' đ'"></span></p><p>Giảm: <span th:text="${#numbers.formatDecimal(order.discountAmount,0,'COMMA',0,'POINT')}+' đ'"></span></p><h4>Tổng đã trừ ví: <span th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')}+' đ'"></span></h4><form th:if="${order.rentalStatus.name()=='PENDING'}" th:action="@{/customer/rentals/{id}/cancel(id=${order.id})}" method="post"><input class="form-control mb-2" name="reason" placeholder="Lý do"><button class="btn btn-danger w-100">Hủy đơn</button></form><form th:if="${order.rentalStatus.name()=='RENTING' or order.rentalStatus.name()=='OVERDUE'}" th:action="@{/customer/rentals/{id}/request-return(id=${order.id})}" method="post"><button class="btn btn-brand w-100 mt-2">Yêu cầu trả sách</button></form></div></div></div></main><footer th:replace="~{fragments/common :: footer}"></footer></body></html>
